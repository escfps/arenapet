workflows:
  ios-appstore:
    name: iOS App Store Release
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - ios_signing
      vars:
        APP_STORE_APPLE_ID: 6772081915
        BUNDLE_ID: "com.arenapet.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 22.12.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Install Capacitor deps
        script: npm install --legacy-peer-deps @capacitor/core @capacitor/ios @capacitor/cli
      - name: Build web assets
        script: |
          npm run build
          ls dist/client/
          if [ ! -f dist/client/index.html ]; then
            cp dist/client/$(ls dist/client/ | grep -i 'index\|app' | head -1) dist/client/index.html 2>/dev/null || \
            echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Arena Pet</title></head><body><div id="root"></div></body></html>' > dist/client/index.html
          fi
      - name: Verify Capacitor config
        script: |
          if [ ! -f capacitor.config.json ]; then
            ./node_modules/.bin/cap init "Arena Pet" com.arenapet.app --web-dir dist/client
          fi
          echo "Using capacitor.config.json:"
          cat capacitor.config.json
      - name: Add and sync iOS
        script: |
          ./node_modules/.bin/cap add ios
          npm install --legacy-peer-deps @capacitor/assets --save-dev
          npx @capacitor/assets generate --ios
          ./node_modules/.bin/cap copy ios
          ./node_modules/.bin/cap sync ios
      - name: Patch iOS Info.plist for Google Sign-In
        script: |
          PLIST="ios/App/App/Info.plist"
          REVERSED_IOS_CLIENT_ID="com.googleusercontent.apps.486152638398-fb6bpnfo14rr5ditb967ft0841fl0bal"
          /usr/libexec/PlistBuddy -c "Delete :CFBundleURLTypes" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string $REVERSED_IOS_CLIENT_ID" "$PLIST"
          /usr/libexec/PlistBuddy -c "Print :CFBundleURLTypes" "$PLIST"

      - name: Set up code signing
        script: |
          keychain initialize
          echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      - name: Inject signing settings only into App target
        script: |
          # Resource bundles dos pacotes SPM (GTM, Facebook, Alamofire, etc.)
          # NÃO suportam provisioning profile. Se passarmos PROVISIONING_PROFILE_SPECIFIER
          # na linha do xcodebuild, vira global e o archive falha em todos eles.
          # Solução: gravar a config de assinatura SÓ no target "App" via xcodeproj gem.
          gem install xcodeproj --no-document
          ruby <<'RUBY'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('ios/App/App.xcodeproj')
          app = project.targets.find { |t| t.name == 'App' }
          raise "App target not found" unless app
          app.build_configurations.each do |config|
            config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
            config.build_settings['DEVELOPMENT_TEAM'] = '8Q7D6F63F2'
            config.build_settings['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
            config.build_settings['CODE_SIGN_IDENTITY[sdk=iphoneos*]'] = 'Apple Distribution'
            config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = 'Arena Pet Appstore'
          end
          project.save
          puts "Signing injected into App target only."
          RUBY
      - name: Build iOS
        script: |
          NEW_BUILD_NUMBER=12
          APP_VERSION=$(node -p "require('./package.json').version")
          echo "Novo build number: $NEW_BUILD_NUMBER"
          echo "Marketing version (do package.json): $APP_VERSION"

          WORKSPACE=$(find ios -name "*.xcworkspace" | grep -v xcodeproj | head -1)
          if [ -z "$WORKSPACE" ]; then
            WORKSPACE=$(find ios -name "*.xcworkspace" | head -1)
          fi
          echo "Workspace: $WORKSPACE"
          xcodebuild -workspace $WORKSPACE -list 2>&1 | head -20
          # NÃO passar PROVISIONING_PROFILE_SPECIFIER / CODE_SIGN_IDENTITY aqui.
          # Eles já estão no target App. Passar na linha aplicaria a TODOS os
          # targets (inclusive bundles SPM que não suportam) e quebra o archive.
          xcodebuild -workspace $WORKSPACE \
            -scheme App \
            -configuration Release \
            -archivePath ios/App/build/App.xcarchive \
            archive \
            CURRENT_PROJECT_VERSION=$NEW_BUILD_NUMBER \
            MARKETING_VERSION=$APP_VERSION
          /usr/libexec/PlistBuddy -c "Add :method string app-store" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :teamID string 8Q7D6F63F2" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:com.arenapet.app string 'Arena Pet Appstore'" /tmp/ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath ios/App/build/App.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath ios/App/build/
    artifacts:
      - ios/App/build/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: true
        release_type: AFTER_APPROVAL

  android-playstore:
    name: Android Play Store Release
    max_build_duration: 90
    instance_type: mac_mini_m1
    environment:
      groups:
        - android_signing
      vars:
        PACKAGE_NAME: "com.arenapet.app"
      node: 22.12.0
      java: 21
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Install Capacitor deps
        script: npm install --legacy-peer-deps @capacitor/core @capacitor/android @capacitor/cli
      - name: Build web assets
        script: |
          npm run build
          ls dist/client/
          if [ ! -f dist/client/index.html ]; then
            cp dist/client/$(ls dist/client/ | grep -i 'index\|app' | head -1) dist/client/index.html 2>/dev/null || \
            echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Arena Pet</title></head><body><div id="root"></div></body></html>' > dist/client/index.html
          fi
      - name: Verify Capacitor config
        script: |
          if [ ! -f capacitor.config.json ]; then
            ./node_modules/.bin/cap init "Arena Pet" com.arenapet.app --web-dir dist/client
          fi
          echo "Using capacitor.config.json:"
          cat capacitor.config.json
      - name: Add and sync Android
        script: |
          ./node_modules/.bin/cap add android
          npm install --legacy-peer-deps @capacitor/assets --save-dev
          npx @capacitor/assets generate --android
          ./node_modules/.bin/cap copy android
          ./node_modules/.bin/cap sync android
          mkdir -p android/app/src/main/assets
          cp capacitor.config.json android/app/src/main/assets/capacitor.config.json
      - name: Patch Android strings.xml for Google Sign-In
        script: |
          STRINGS="android/app/src/main/res/values/strings.xml"
          SERVER_CLIENT_ID="486152638398-rk8rqgq0b2fhdcnok8s25oijqneqnqjk.apps.googleusercontent.com"
          if grep -q "server_client_id" "$STRINGS"; then
            echo "server_client_id already present"
          else
            sed -i "s|</resources>|    <string name=\"server_client_id\">$SERVER_CLIENT_ID</string>\n</resources>|" "$STRINGS"
          fi
          cat "$STRINGS"


      - name: Set up Android signing
        script: |
          echo $CM_KEYSTORE | base64 --decode > /tmp/keystore.jks
          cat >> android/app/build.gradle << EOF
          android {
              signingConfigs {
                  release {
                      storeFile file('/tmp/keystore.jks')
                      storePassword '$CM_KEYSTORE_PASSWORD'
                      keyAlias '$CM_KEY_ALIAS'
                      keyPassword '$CM_KEY_PASSWORD'
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF
      - name: Build Android AAB
        script: |
          APP_VERSION=$(node -p "require('./package.json').version")
          NEW_VERSION_CODE=$(($BUILD_NUMBER + 10))
          echo "Novo versionCode: $NEW_VERSION_CODE"
          echo "versionName (do package.json): $APP_VERSION"
          cd android
          cat app/build.gradle | grep -A5 "defaultConfig"
          sed -i '' "s/versionCode [0-9]*/versionCode $NEW_VERSION_CODE/" app/build.gradle || sed -i "s/versionCode [0-9]*/versionCode $NEW_VERSION_CODE/" app/build.gradle
          sed -i '' "s/versionName \"[^\"]*\"/versionName \"$APP_VERSION\"/" app/build.gradle || sed -i "s/versionName \"[^\"]*\"/versionName \"$APP_VERSION\"/" app/build.gradle
          cat app/build.gradle | grep -A5 "defaultConfig"
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
