workflows:
  ios-appstore:
    name: iOS App Store Release
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.arenapet.app
      vars:
        APP_STORE_APPLE_ID: 6772081915
        BUNDLE_ID: "com.arenapet.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20.11.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web assets
        script: npm run build
      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/ios
          npx cap init "Arena Pet" com.arenapet.app --web-dir dist
          npx cap add ios
          npx cap copy ios
          npx cap sync ios
      - name: Install pods
        script: |
          cd ios/App
          pod install
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
