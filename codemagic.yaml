workflows:
  ios-appstore:
    name: iOS App Store Release
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - ios_signing
      vars:
        APP_STORE_APPLE_ID: 6772081915
        BUNDLE_ID: "com.arenapet.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 22.12.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install Capacitor deps
        script: npm install @capacitor/core @capacitor/ios @capacitor/cli
      - name: Build web assets
        script: |
          npm run build
          ls dist/client/
          if [ ! -f dist/client/index.html ]; then
            cp dist/client/$(ls dist/client/ | grep -i 'index\|app' | head -1) dist/client/index.html 2>/dev/null || \
            echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Arena Pet</title></head><body><div id="root"></div></body></html>' > dist/client/index.html
          fi
      - name: Init Capacitor
        script: |
          ./node_modules/.bin/cap init "Arena Pet" com.arenapet.app --web-dir dist/client
          echo '{"appId":"com.arenapet.app","appName":"Arena Pet","webDir":"dist/client","server":{"url":"https://arenapet.lovable.app","cleartext":false}}' > capacitor.config.json
      - name: Add and sync iOS
        script: |
          ./node_modules/.bin/cap add ios
          ./node_modules/.bin/cap copy ios
          ./node_modules/.bin/cap sync ios
      - name: Set up code signing
        script: |
          keychain initialize
          echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      - name: Build iOS
        script: |
          WORKSPACE=$(find ios -name "*.xcworkspace" | grep -v xcodeproj | head -1)
          if [ -z "$WORKSPACE" ]; then
            WORKSPACE=$(find ios -name "*.xcworkspace" | head -1)
          fi
          echo "Workspace: $WORKSPACE"
          xcodebuild -workspace $WORKSPACE -list 2>&1 | head -20
          xcodebuild -workspace $WORKSPACE \
            -scheme App \
            -configuration Release \
            -archivePath ios/App/build/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="Arena Pet Appstore" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="8Q7D6F63F2" \
            CURRENT_PROJECT_VERSION=2 \
            MARKETING_VERSION=1.0.1
          /usr/libexec/PlistBuddy -c "Add :method string app-store" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :teamID string 8Q7D6F63F2" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:com.arenapet.app string 'Arena Pet Appstore'" /tmp/ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath ios/App/build/App.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath ios/App/build/
    artifacts:
      - ios/App/build/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: true
        release_type: AFTER_APPROVAL

  android-playstore:
    name: Android Play Store Release
    max_build_duration: 90
    instance_type: mac_mini_m1
    environment:
      groups:
        - android_signing
      vars:
        PACKAGE_NAME: "com.arenapet.app"
      node: 22.12.0
      java: 21
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install Capacitor deps
        script: npm install @capacitor/core @capacitor/android @capacitor/cli
      - name: Build web assets
        script: |
          npm run build
          ls dist/client/
          if [ ! -f dist/client/index.html ]; then
            cp dist/client/$(ls dist/client/ | grep -i 'index\|app' | head -1) dist/client/index.html 2>/dev/null || \
            echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Arena Pet</title></head><body><div id="root"></div></body></html>' > dist/client/index.html
          fi
      - name: Init Capacitor
        script: |
          ./node_modules/.bin/cap init "Arena Pet" com.arenapet.app --web-dir dist/client
          echo '{"appId":"com.arenapet.app","appName":"Arena Pet","webDir":"dist/client","server":{"url":"https://arenapet.lovable.app","cleartext":false}}' > capacitor.config.json
      - name: Add and sync Android
        script: |
          ./node_modules/.bin/cap add android
          ./node_modules/.bin/cap sync android
      - name: Set up Android signing
        script: |
          echo $CM_KEYSTORE | base64 --decode > /tmp/keystore.jks
          cat >> android/app/build.gradle << EOF
          android {
              signingConfigs {
                  release {
                      storeFile file('/tmp/keystore.jks')
                      storePassword '$CM_KEYSTORE_PASSWORD'
                      keyAlias '$CM_KEY_ALIAS'
                      keyPassword '$CM_KEY_PASSWORD'
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF
      - name: Build Android AAB
        script: |
          cd android
          cat app/build.gradle | grep -A5 "defaultConfig"
          sed -i '' 's/versionCode [0-9]*/versionCode 4/' app/build.gradle || sed -i 's/versionCode [0-9]*/versionCode 4/' app/build.gradle
          sed -i '' 's/versionName "[^"]*"/versionName "1.0.3"/' app/build.gradle || sed -i 's/versionName "[^"]*"/versionName "1.0.3"/' app/build.gradle
          cat app/build.gradle | grep -A5 "defaultConfig"
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
